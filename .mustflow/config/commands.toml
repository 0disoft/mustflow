kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Accept reviewed local workflow baseline changes for AGENTS.md, the source workflow reference, the source command contract, and the compact skill router."
argv = ["node", "scripts/accept-manifest-lock-baseline.mjs", "AGENTS.md", ".mustflow/docs/agent-workflow.md", ".mustflow/config/commands.toml", ".mustflow/skills/router.toml"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = [".mustflow/config/manifest.lock.toml"]
effects = [{ type = "write", mode = "replace", path = ".mustflow/config/manifest.lock.toml", lock = "manifest_lock_baseline", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change"]

[intents.release_stage_v2_115_17]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Stage only the reviewed files for the 2.115.17 legacy Git approval inference hotfix."
argv = ["git", "add", "--", ".mustflow/config/commands.toml", ".mustflow/config/manifest.lock.toml", "REPO_FLOW.md", "package.json", "src/cli/lib/run-plan.ts", "src/core/approval-actions.ts", "src/core/command-contract-validation.ts", "templates/default/manifest.toml", "tests/cli/check-command-contracts.test.js", "tests/cli/package-command-contracts.test.js", "tests/cli/package-metadata-contracts.test.js", "tests/cli/run-preview.test.js"]
cwd = "."
timeout_seconds = 60
stdin = "closed"
success_exit_codes = [0]
writes = [".git/index"]
effects = [{ type = "write", mode = "replace", path = ".git/index", lock = "git_index", concurrency = "exclusive" }]
network = false
destructive = false
approval_actions = ["git_commit"]

[intents.release_commit_v2_115_17]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Commit the reviewed 2.115.17 legacy Git approval inference hotfix with a fixed message."
argv = ["git", "commit", "-m", "fix(workflow): infer approvals for legacy Git intents"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = [".git/**"]
effects = [{ type = "write", mode = "replace", lock = "git_history", concurrency = "exclusive" }]
network = false
destructive = false
approval_actions = ["git_commit"]

[intents.release_push_main_v2_115_17]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Push the reviewed 2.115.17 hotfix commit from local main to origin main."
argv = ["git", "push", "origin", "main"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = true
destructive = false
approval_actions = ["git_push"]

[intents.git_commit]
status = "manual_only"
description = "Create an unscoped Git commit."
reason = "A generic commit cannot safely choose reviewed paths or a commit message."
agent_action = "author_bounded_repo_specific_stage_and_commit_intents_after_explicit_user_request"
approval_actions = ["git_commit"]

[intents.git_push]
status = "manual_only"
description = "Push an unspecified Git ref."
reason = "A generic push cannot safely choose the remote and ref."
agent_action = "author_bounded_repo_specific_push_intent_after_explicit_user_request"
approval_actions = ["git_push"]
