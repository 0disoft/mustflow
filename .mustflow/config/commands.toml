schema_version = "1"

# This file is the command-intent contract that prevents agents from guessing commands.
# mf run executes only configured + oneshot + agent_allowed + closed stdin + explicit timeout + declared command intents.
# cwd must stay inside the current mustflow root.

[defaults]
missing_behavior = "do_not_guess"
allow_inferred_commands = false
require_lifecycle = true
require_timeout_for_oneshot = true
deny_unmanaged_long_running = true
default_cwd = "."
default_timeout_seconds = 600
stdin = "closed"
max_output_bytes = 1048576
on_timeout = "terminate_process_tree"
kill_after_seconds = 5
env_policy = "minimal"
env_allowlist = []

[resources.dist_build_output]
type = "path"
paths = ["dist/**"]
concurrency = "exclusive_writer"
description = "Generated CLI build output. Commands that rebuild dist must not overlap."

[resources.docs_site_build_output]
type = "path"
paths = ["docs-site/dist/**"]
concurrency = "exclusive_writer"
description = "Generated documentation site build output."

[intents.test]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the full repository CLI test suite."
argv = ["bun", "run", "test:full"]
cwd = "."
timeout_seconds = 900
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["cross_cutting_code_change", "behavior_change", "test_change", "release_risk"]

[intents.test_related]
lifecycle = "oneshot"
run_policy = "agent_allowed"
status = "configured"
description = "Run tests selected from changed files, falling back to the fast baseline."
argv = ["bun", "run", "test:related"]
cwd = "."
timeout_seconds = 420
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["code_change", "behavior_change", "test_change"]

[intents.test_related_cached]
lifecycle = "oneshot"
run_policy = "agent_allowed"
status = "configured"
description = "Run tests selected from changed files without rebuilding dist; fails when source changes require a fresh build."
argv = ["bun", "run", "test:related:cached"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["explicit_cached_test_request"]

[intents.test_related_profile]
lifecycle = "oneshot"
run_policy = "agent_allowed"
status = "configured"
description = "Measure changed-file-selected test files one by one so slow files are visible."
argv = ["bun", "run", "test:related:profile"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["test_performance_investigation"]

[intents.test_fast]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the fast CLI regression baseline."
argv = ["bun", "run", "test:fast"]
cwd = "."
timeout_seconds = 360
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["low_risk_code_change", "copy_change", "i18n_change", "unknown_change"]

[intents.test_coverage]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the fast CLI baseline with Node's built-in coverage report without enforcing thresholds."
argv = ["bun", "run", "test:coverage"]
cwd = "."
timeout_seconds = 420
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["test_policy_change", "coverage_request"]

[intents.test_audit]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect stale or redundant test candidates."
argv = ["bun", "run", "test:audit"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["test_change", "test_policy_change", "behavior_removed"]

[intents.test_release]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run release-sensitive package metadata and packaging tests."
argv = ["bun", "run", "test:release"]
cwd = "."
timeout_seconds = 420
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["package_metadata_change", "template_version_change", "packaging_change"]

[intents.snapshot_update]
status = "manual_only"
description = "Update snapshot test baselines."
reason = "Snapshot updates can hide unintended output changes and require explicit review."
agent_action = "do_not_update_snapshots_without_approval"
required_after = ["snapshot_change", "user_approved_snapshot_update"]

[intents.asset_optimize]
status = "unknown"
description = "Optimize web image assets with the repository's declared image pipeline."
reason = "No image optimization command has been declared for this repository."
agent_action = "do_not_guess_report_missing"
required_after = ["image_asset_change", "web_asset_change"]

[intents.lint]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the TypeScript no-emit static check."
argv = ["bun", "run", "check:typecheck"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["code_change", "style_change"]

[intents.line_endings_check]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect tracked files for CRLF or mixed line-ending drift."
argv = ["mf", "line-endings", "check", "--json"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["line_ending_warning", "formatting_change"]

[intents.line_endings_normalize]
status = "manual_only"
description = "Normalize tracked text files to the repository line-ending policy."
reason = "Line-ending normalization rewrites tracked files and requires an explicit request."
agent_action = "do_not_normalize_report_suggestion_only"
required_after = ["user_requested_line_ending_normalization"]

[intents.build]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Build the TypeScript CLI into dist."
argv = ["bun", "run", "build"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["code_change", "build_config_change", "public_api_change"]

[intents.docs_validate]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Validate the full documentation site navigation, static build, search index, and sitemap output."
argv = ["bun", "run", "docs:check"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = ["docs-site/dist/"]
effects = [
  { type = "write", mode = "delete_recreate", path = "docs-site/dist/**", lock = "docs_site_build_output", concurrency = "exclusive" },
]
network = false
destructive = false
required_after = ["docs_site_config_change", "release_risk", "before_publish"]

[intents.docs_validate_fast]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Validate documentation navigation and localized content links without a full static build."
argv = ["bun", "run", "docs:check:fast"]
cwd = "."
timeout_seconds = 60
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["docs_change", "copy_change", "i18n_change"]

[intents.mustflow_doctor]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Diagnose the mustflow root state, check result, and next steps read-only."
argv = ["mf", "doctor", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_task", "mustflow_config_change", "mustflow_docs_change"]

[intents.mustflow_check]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Strictly validate the mustflow document flow and configuration files."
argv = ["mf", "check", "--strict"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change"]

[intents.mustflow_update_dry_run]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Preview installed mustflow workflow template updates without writing files."
argv = ["mf", "update", "--dry-run", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change", "template_update_check"]

[intents.mustflow_update_apply]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Apply safe installed mustflow workflow template updates after a clean update plan."
argv = ["mf", "update", "--apply", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = [
  "AGENTS.md",
  ".mustflow/config/manifest.lock.toml",
  ".mustflow/config/commands.toml",
  ".mustflow/config/mustflow.toml",
  ".mustflow/config/preferences.toml",
  ".mustflow/context/**",
  ".mustflow/docs/**",
  ".mustflow/skills/**",
  ".mustflow/backups/**",
]
network = false
destructive = false
required_after = ["clean_mustflow_update_plan", "template_update_apply"]

[intents.repo_map]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Create or refresh the REPO_MAP.md repository navigation map."
argv = ["mf", "map", "--write"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = ["REPO_MAP.md"]
network = false
destructive = false
required_after = ["structure_change", "directory_change"]

[intents.changes_status]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect changed files in the Git working tree read-only."
argv = ["git", "status", "--short"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_final_report", "commit_message_suggestion"]

[intents.changes_diff_summary]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect a read-only summary of Git changes."
argv = ["git", "diff", "--stat"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_final_report", "commit_message_suggestion"]

[intents.git_commit]
status = "manual_only"
description = "Create a Git commit."
reason = "Creating a commit requires explicit user approval."
agent_action = "do_not_commit_report_suggestion_only"
