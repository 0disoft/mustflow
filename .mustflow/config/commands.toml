schema_version = "1"

# This file is the command-intent contract that prevents agents from guessing commands.
# mf run executes only configured + oneshot + agent_allowed + closed stdin + explicit timeout + declared command intents.
# cwd must stay inside the current mustflow root.

[defaults]
missing_behavior = "do_not_guess"
allow_inferred_commands = false
require_lifecycle = true
require_timeout_for_oneshot = true
deny_unmanaged_long_running = true
default_cwd = "."
default_timeout_seconds = 600
stdin = "closed"
max_output_bytes = 1048576
on_timeout = "terminate_process_tree"
kill_after_seconds = 5
env_policy = "allowlist"
env_allowlist = [
  "MUSTFLOW_TEST_CONCURRENCY",
  "MUSTFLOW_TEST_RELATED_CONCURRENCY",
  "MUSTFLOW_TEST_CLI_CONCURRENCY",
  "MUSTFLOW_TEST_FULL_CONCURRENCY",
  "MUSTFLOW_TEST_COVERAGE_CONCURRENCY",
  "MUSTFLOW_TEST_SCHEDULER",
  "MUSTFLOW_TEST_CPU_TOKENS",
  "MUSTFLOW_TEST_IO_TOKENS",
  "MUSTFLOW_TEST_PROCESS_TOKENS",
  "MUSTFLOW_TEST_SQLITE_TOKENS",
  "MUSTFLOW_TEST_GIT_TOKENS",
  "MUSTFLOW_TEST_CHANGED_FILES",
  "MUSTFLOW_NPM_REGISTRY_URL",
]

[resources.dist_build_output]
description = "Generated TypeScript CLI build output under dist/."
concurrency = "exclusive_writer"

[resources.local_index_cache]
description = "Generated mustflow SQLite local index under .mustflow/cache/."
concurrency = "exclusive_writer"

[resources.documentation_review_queue]
description = "Repository-local documentation review queue under .mustflow/review/docs.toml."
concurrency = "exclusive_writer"

[resources.manifest_lock_baseline]
description = "Repository-local manifest lock baseline under .mustflow/config/manifest.lock.toml."
concurrency = "exclusive_writer"

[resources.npm_release_channel]
description = "Remote GitHub Release and npm publication channel for mustflow."
concurrency = "exclusive_writer"

[intents.build]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Compile the mustflow TypeScript CLI into dist/."
argv = ["bun", "run", "build"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["build_config_change", "public_api_change", "package_metadata_change"]

[intents.lint]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the no-emit TypeScript static check."
argv = ["bun", "run", "check:typecheck"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["code_change", "style_change", "public_api_change"]

[intents.test_fast]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the fast mustflow CLI regression baseline after rebuilding dist/."
argv = ["bun", "run", "test:fast"]
cwd = "."
timeout_seconds = 900
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["low_risk_code_change", "copy_change", "i18n_change", "unknown_change"]

[intents.test_related]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run mustflow CLI tests selected from changed files, rebuilding dist/ only when build inputs are missing or stale."
argv = ["bun", "run", "test:related"]
cwd = "."
timeout_seconds = 1200
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["code_change", "behavior_change", "test_change", "mustflow_config_change", "mustflow_docs_change"]

[intents.test_related.covers]
reasons = ["code_change", "behavior_change", "test_change", "mustflow_config_change", "mustflow_docs_change"]
surfaces = ["mustflow_cli"]
paths = ["src/**", "tests/**", ".mustflow/config/**", ".mustflow/docs/**"]
contracts = ["related CLI regression coverage"]

[intents.test_related.cost]
expected_seconds = 180
cost_tier = "medium"

[intents.test_skill_contracts]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the changed skill contract shard plus lightweight source, template, route, manifest, i18n, and revision checks."
argv = ["bun", "run", "test:skill-contracts"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = []

[intents.test_skill_contracts.covers]
reasons = ["mustflow_docs_change"]
surfaces = ["mustflow_skill_contracts"]
paths = [
  ".mustflow/skills/**",
  "templates/default/locales/en/.mustflow/skills/**",
  "templates/default/manifest.toml",
  "templates/default/i18n.toml",
]
contracts = ["skill source, shard, route, index, template manifest, locale metadata, and revision alignment"]

[intents.test_skill_contracts.cost]
expected_seconds = 20
cost_tier = "low"

[intents.test_related_profile]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Profile mustflow CLI tests selected from changed files after rebuilding dist/."
argv = ["bun", "run", "test:related:profile"]
cwd = "."
timeout_seconds = 1800
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["performance_change", "verification_performance_review"]

[intents.test_related_cached]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run mustflow CLI tests selected from changed files using an already-fresh dist/ build."
argv = ["bun", "run", "test:related:cached"]
cwd = "."
timeout_seconds = 900
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["code_change", "behavior_change", "test_change", "mustflow_config_change", "mustflow_docs_change"]
preconditions = [
  { kind = "artifact_freshness", artifact = "dist/cli/index.js", sources = ["src/**", "tsconfig*.json"], satisfy_intent = "test_related" },
]

[intents.test_related_cached.covers]
reasons = ["code_change", "behavior_change", "test_change", "mustflow_config_change", "mustflow_docs_change"]
surfaces = ["mustflow_cli"]
paths = ["src/**", "tests/**", ".mustflow/config/**", ".mustflow/docs/**"]
contracts = ["related CLI regression coverage"]

[intents.test_related_cached.selection]
fallback_intents = ["test_related"]

[intents.test_related_cached.cost]
expected_seconds = 90
cost_tier = "low"

[intents.test]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the full mustflow CLI regression suite after rebuilding dist/."
argv = ["bun", "run", "test"]
cwd = "."
timeout_seconds = 1800
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["release_risk", "cross_cutting_code_change"]

[intents.test_release]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run release-sensitive package metadata and packaging tests after rebuilding dist/."
argv = ["bun", "run", "test:release"]
cwd = "."
timeout_seconds = 900
stdin = "closed"
success_exit_codes = [0]
writes = ["dist/**"]
effects = [{ type = "write", mode = "delete_recreate", path = "dist/**", lock = "dist_build_output", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["package_metadata_change", "template_version_change", "packaging_change", "public_api_change"]

[intents.test_audit]
status = "configured"
lifecycle = "oneshot"
