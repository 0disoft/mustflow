name: OSV-Scanner

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - docs-site/package.json
      - docs-site/bun.lock
      - .github/workflows/osv-scanner.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - docs-site/package.json
      - docs-site/bun.lock
      - .github/workflows/osv-scanner.yml
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan-pr:
    name: Scan pull request dependencies
    if: github.event_name == 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./

  scan-full:
    name: Scan repository dependencies
    if: github.event_name != 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --recursive
        ./
