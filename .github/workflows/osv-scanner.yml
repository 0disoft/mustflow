name: OSV-Scanner

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - docs-site/package.json
      - docs-site/bun.lock
      - .github/workflows/osv-scanner.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - docs-site/package.json
      - docs-site/bun.lock
      - .github/workflows/osv-scanner.yml
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: osv-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@ffff457756fc02fd3b933aabf3705406f57a2e19
        continue-on-error: true
        with:
          scan-args: |-
            --output=results.json
            --format=json
            --recursive
            ./

      - name: Generate SARIF
        uses: google/osv-scanner-action/osv-reporter-action@ffff457756fc02fd3b933aabf3705406f57a2e19
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=true
            --fail-on-vuln=false

      - name: Upload OSV SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: results.sarif
