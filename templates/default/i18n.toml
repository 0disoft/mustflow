version = 1

# 현재 템플릿 문서의 기준 언어입니다.
source_locale = "en"

# 파일 수정 시각으로 최신 여부를 판단하지 않습니다.
# 기준 문서의 revision과 번역본의 source_revision을 비교해서 판단합니다.
status_values = ["current", "stale", "needs_review", "missing"]

[documents."agents.root"]
source = "locales/en/AGENTS.md"
source_locale = "en"
revision = 4
translations.ko = { path = "locales/ko/AGENTS.md", source_revision = 4, status = "current" }

