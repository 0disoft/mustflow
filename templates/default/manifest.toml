[locales]
default = "en"
available = ["en", "ko", "zh", "es", "fr", "hi"]
source = "en"

[install_policy]
scope = "llm_only"
copied_targets = ["AGENTS.md", ".mustflow/**"]
managed_targets = [".gitignore"]
generated_targets = [
  "REPO_MAP.md",
  ".mustflow/config/manifest.lock.toml",
  ".mustflow/cache/**",
  ".mustflow/state/**",
  ".mustflow/worklogs/**",
  ".mustflow/plans/**",
  ".mustflow/tasks/**",
  ".mustflow/work-items/**",
]
forbidden_targets = [
  "README.md",
  "PROJECT.md",
  "ROADMAP.md",
  "DESIGN.md",
  "CONTRIBUTING.md",
  "SECURITY.md",
  "CHANGELOG.md",
  "CODE_OF_CONDUCT.md",
  "SUPPORT.md",
  "GOVERNANCE.md",
  "MAINTAINERS.md",
  "RELEASING.md",
  "RELEASE.md",
  "TESTING.md",
  "DEPLOYMENT.md",
  "OPERATIONS.md",
  "RUNBOOK.md",
  "CONFIGURATION.md",
  "DATA_MODEL.md",
  "SCHEMA.md",
  "PRIVACY.md",
  "TROUBLESHOOTING.md",
  "ARCHITECTURE.md",
  "API.md",
  "project.contract.json",
  "project.constants.json",
  "design-tokens.json",
  "openapi.json",
  "openapi.yaml",
  "openapi.yml",
  "asyncapi.json",
  "asyncapi.yaml",
  "asyncapi.yml",
  "schema.graphql",
  "schema.prisma",
  ".github/**",
  "docs/**",
  "skills/**",
  "config/**",
  "src/**",
  "package.json",
  "pyproject.toml",
  "go.mod",
]

[i18n]
metadata = "i18n.toml"
source_locale = "en"

[conflict_policy]
default = "abort"

[conflict_policy.files]
"AGENTS.md" = "merge_with_managed_block"
".mustflow/config/commands.toml" = "abort"
".mustflow/config/mustflow.toml" = "abort"
".mustflow/config/preferences.toml" = "abort"
".mustflow/config/technology.toml" = "abort"
".mustflow/context/INDEX.md" = "abort"
".mustflow/context/PROJECT.md" = "abort"

[conflict_policy.generated]
"REPO_MAP.md" = "prompt"
".mustflow/config/manifest.lock.toml" = "regenerate"
".mustflow/cache/**" = "keep"
".mustflow/state/**" = "keep"
".mustflow/worklogs/**" = "keep"
".mustflow/plans/**" = "keep"
".mustflow/tasks/**" = "keep"
".mustflow/work-items/**" = "keep"
