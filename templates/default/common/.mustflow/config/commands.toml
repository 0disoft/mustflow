schema_version = "1"

# This file is the command-intent contract that prevents agents from guessing commands.
# mf run executes only configured + oneshot + agent_allowed + closed stdin + explicit timeout + declared command intents.
# cwd must stay inside the current mustflow root.

[defaults]
missing_behavior = "do_not_guess"
allow_inferred_commands = false
require_lifecycle = true
require_timeout_for_oneshot = true
deny_unmanaged_long_running = true
default_cwd = "."
default_timeout_seconds = 600
stdin = "closed"
max_output_bytes = 1048576
on_timeout = "terminate_process_tree"
kill_after_seconds = 5
env_policy = "minimal"
env_allowlist = []
allow_project_local_bin_bare_executables = ["mf", "mustflow"]

[resources.local_index_cache]
description = "Generated mustflow SQLite local index under .mustflow/cache/."
concurrency = "exclusive_writer"

[resources.documentation_review_queue]
description = "Repository-local documentation review queue under .mustflow/review/docs.toml."
concurrency = "exclusive_writer"

[intents.test]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the default Bun test suite."
argv = ["bun", "test"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["release_risk", "cross_cutting_code_change", "full_test_request"]

[intents.test_related]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the default Bun test suite for changed code when no narrower test command exists."
argv = ["bun", "test"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["code_change", "behavior_change", "test_change"]

[intents.test_fast]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Run the default Bun test suite as the fast baseline until the repository narrows it."
argv = ["bun", "test"]
cwd = "."
timeout_seconds = 600
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["low_risk_code_change", "copy_change", "i18n_change", "unknown_change"]

[intents.test_coverage]
status = "manual_only"
description = "Inspect test coverage information."
reason = "Coverage runs may be slow or require repository-specific interpretation."
agent_action = "do_not_run_report_manual"
required_after = ["test_policy_change", "coverage_request"]

[intents.test_audit]
status = "unknown"
description = "Inspect stale or redundant test candidates."
reason = "This repository has not declared its test-audit command yet."
agent_action = "do_not_guess_report_missing"
required_after = []

[intents.test_release]
status = "unknown"
description = "Run release-sensitive package metadata and packaging tests."
reason = "This repository has not declared its release-test command yet."
agent_action = "do_not_guess_report_missing"
required_after = ["package_metadata_change", "template_version_change", "packaging_change"]

[intents.snapshot_update]
status = "manual_only"
description = "Update snapshot test baselines."
reason = "Snapshot updates can hide unintended output changes and require explicit review."
agent_action = "do_not_update_snapshots_without_approval"
required_after = ["snapshot_change", "user_approved_snapshot_update"]

[intents.asset_optimize]
status = "unknown"
description = "Optimize web image assets with the repository's declared image pipeline."
reason = "No image optimization command has been declared for this repository."
agent_action = "do_not_guess_report_missing"
required_after = ["image_asset_change", "web_asset_change"]

[intents.lint]
status = "unknown"
description = "Run linting or static analysis."
reason = "This repository has not declared its lint command yet."
agent_action = "do_not_guess_report_missing"
required_after = []

[intents.line_endings_check]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect tracked files for CRLF or mixed line-ending drift."
argv = ["mf", "line-endings", "check", "--json"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["line_ending_warning", "formatting_change"]

[intents.quality_gaming_check]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect changed files for AI quality-gaming patterns."
argv = ["mf", "quality", "check", "--json"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["code_change", "behavior_change", "test_change", "public_api_change", "performance_change", "unknown_change"]

[intents.script_pack_list]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "List bundled mustflow script-pack utilities and routing metadata read-only."
argv = ["mf", "script-pack", "list", "--json"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_task", "docs_change", "public_api_change", "unknown_change"]

[intents.script_pack_suggest_changed]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Suggest bundled mustflow script-pack utilities for current changed files read-only."
argv = ["mf", "script-pack", "suggest", "--changed", "--json"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_task", "docs_change", "public_api_change", "mustflow_docs_change", "unknown_change"]

[intents.prompt_cache_audit]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Measure prompt-cache profile sizes and configured budget status read-only."
argv = ["mf", "context", "--json", "--cache-profile", "all", "--cache-audit"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change", "public_api_change", "performance_change", "unknown_change"]

[intents.line_endings_normalize]
status = "manual_only"
description = "Normalize tracked text files to the repository line-ending policy."
reason = "Line-ending normalization rewrites tracked files and requires an explicit request."
agent_action = "do_not_normalize_report_suggestion_only"
required_after = ["user_requested_line_ending_normalization"]

[intents.build]
status = "unknown"
description = "Run build or type checks."
reason = "This repository has not declared its build command yet."
agent_action = "do_not_guess_report_missing"
required_after = ["build_config_change", "public_api_change"]

[intents.docs_validate]
status = "unknown"
description = "Validate full documentation links, examples, generated docs, search index, and sitemap output."
reason = "This repository has not declared its documentation validation command yet."
agent_action = "do_not_guess_report_missing"
required_after = ["docs_site_config_change", "release_risk", "before_publish"]

[intents.docs_validate_fast]
status = "unknown"
description = "Validate documentation navigation and localized content links without a full static build."
reason = "This repository has not declared its fast documentation validation command yet."
agent_action = "do_not_guess_report_missing"
required_after = ["docs_change", "copy_change", "i18n_change"]

[intents.docs_review_add_changed]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Add changed documentation review candidates from git status to the review queue."
argv = ["mf", "docs", "review", "add", "--changed"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = [".mustflow/review/docs.toml"]
effects = [{ type = "write", mode = "replace", path = ".mustflow/review/docs.toml", lock = "documentation_review_queue", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["docs_change", "mustflow_docs_change", "i18n_change", "copy_change"]

[intents.mustflow_doctor]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Diagnose the mustflow root state, check result, and next steps read-only."
argv = ["mf", "doctor", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_task", "mustflow_config_change", "mustflow_docs_change"]

[intents.mustflow_check]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Strictly validate the mustflow document flow and configuration files."
argv = ["mf", "check", "--strict"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change"]

[intents.mustflow_update_dry_run]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Preview installed mustflow workflow template updates without writing files."
argv = ["mf", "update", "--dry-run", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["mustflow_config_change", "mustflow_docs_change", "template_update_check"]

[intents.mustflow_update_apply]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Apply safe installed mustflow workflow template updates after a clean update plan."
argv = ["mf", "update", "--apply", "--json"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = [
  "AGENTS.md",
  ".mustflow/config/manifest.lock.toml",
  ".mustflow/config/commands.toml",
  ".mustflow/config/mustflow.toml",
  ".mustflow/config/preferences.toml",
  ".mustflow/context/**",
  ".mustflow/docs/**",
  ".mustflow/skills/**",
  ".mustflow/backups/**",
]
network = false
destructive = false
required_after = ["clean_mustflow_update_plan", "template_update_apply"]

[intents.local_index]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Create or refresh the generated mustflow SQLite local index, including bounded source anchors."
argv = ["mf", "index", "--source"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = [".mustflow/cache/**"]
effects = [{ type = "write", mode = "replace", path = ".mustflow/cache/**", lock = "local_index_cache", concurrency = "exclusive" }]
network = false
destructive = false
required_after = ["structure_change", "directory_change"]

[intents.repo_map]
status = "configured"
kind = "mustflow_builtin"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Create or refresh the REPO_MAP.md repository navigation map."
argv = ["mf", "map", "--write"]
cwd = "."
timeout_seconds = 300
stdin = "closed"
success_exit_codes = [0]
writes = ["REPO_MAP.md"]
network = false
destructive = false
required_after = ["structure_change", "directory_change"]

[intents.changes_status]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect changed files in the Git working tree read-only."
argv = ["git", "status", "--short"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_final_report", "commit_message_suggestion"]

[intents.changes_diff_summary]
status = "configured"
lifecycle = "oneshot"
run_policy = "agent_allowed"
description = "Inspect a read-only summary of Git changes."
argv = ["git", "diff", "--stat"]
cwd = "."
timeout_seconds = 120
stdin = "closed"
success_exit_codes = [0]
writes = []
network = false
destructive = false
required_after = ["before_final_report", "commit_message_suggestion"]

[intents.git_commit]
status = "manual_only"
description = "Create an unscoped Git commit."
reason = "A generic commit cannot safely choose reviewed paths or a commit message."
agent_action = "author_bounded_repo_specific_stage_and_commit_intents_after_explicit_user_request"
approval_actions = ["git_commit"]

[intents.git_push]
status = "manual_only"
description = "Push an unspecified Git ref."
reason = "A generic push cannot safely choose the remote and ref."
agent_action = "author_bounded_repo_specific_push_intent_after_explicit_user_request"
approval_actions = ["git_push"]
